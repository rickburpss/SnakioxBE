name: Keep Render awake

# Render's free web services spin down after ~15 min of inactivity. Pinging
# /health every 11 min keeps the instance warm so the first real request isn't
# stuck waiting ~50s for a cold start.
on:
  schedule:
    - cron: "*/11 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://snakioxbe.onrender.com/health
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 --retry 3 --retry-delay 10 "$HEALTH_URL")
          echo "GET $HEALTH_URL -> $code"
          [ "$code" -ge 200 ] && [ "$code" -lt 400 ]
